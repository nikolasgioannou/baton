name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [darwin-arm64, darwin-x64, linux-x64, linux-arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: compile
        run: bun build src/index.ts --compile --target=bun-${{ matrix.target }} --outfile dist/baton-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: baton-${{ matrix.target }}
          path: dist/baton-${{ matrix.target }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: list artifacts
        run: ls -lh dist/
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/baton-* --generate-notes --verify-tag
